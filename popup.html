<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads Organizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 240px;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 20px; }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .body { padding: 14px 16px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .toggle-label { font-size: 13px; color: #444; }

    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: background 0.2s;
    }

    .slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #4f46e5; }
    input:checked + .slider:before { transform: translateX(18px); }

    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .status span { font-weight: 600; color: #4f46e5; }

    .divider { border: none; border-top: 1px solid #eee; margin-bottom: 12px; }

    .btn-options {
      display: block;
      width: 100%;
      padding: 8px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      color: #444;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn-options:hover { background: #ebebeb; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">📂</span>
    <h1>Downloads Organizer</h1>
  </div>
  <div class="body">
    <div class="toggle-row">
      <span class="toggle-label">Auto-organize</span>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle">
        <span class="slider"></span>
      </label>
    </div>
    <p class="status" id="statusText">Loading…</p>
    <hr class="divider">
    <button class="btn-options" id="openOptions">⚙ Manage rules</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
